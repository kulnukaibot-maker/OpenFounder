services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openfounder
      POSTGRES_USER: openfounder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openfounder_dev}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./openfounder/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfounder"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://openfounder:${POSTGRES_PASSWORD:-openfounder_dev}@db:5432/openfounder
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./openfounder:/app/openfounder
      - ./scripts:/app/scripts

volumes:
  pgdata:
